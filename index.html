<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biologiya Admin Panel</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">B</div>
      <div class="brand-text">
        <h1>Biologiya</h1>
        <p>Admin Panel</p>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-view="dashboard">
        <span class="nav-icon">▦</span>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="students">
        <span class="nav-icon">👥</span>
        <span>O‘quvchilar</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar">A</div>
        <div>
          <div class="user-name">Admin</div>
          <div class="user-role">8-sinf</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Menyu">☰</button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-date" id="topbarDate"></div>
    </header>

    <section class="view" id="view-dashboard"></section>
    <section class="view hidden" id="view-students"></section>
    <section class="view hidden" id="view-detail"></section>
  </main>

  <script src="quiz-data.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
